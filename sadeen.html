<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sadeen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dms.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <div class="background-elements">
        <video id="wallpaper-video" autoplay loop muted playsinline class="wallpaper-video hidden"></video>
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- Story Display Container (Insta Style) -->
    <main id="story-container" class="glass-panel ig-panel girly-theme-ig">
        <div class="ig-nav">
            <button id="back-to-choices-btn" class="ig-icon-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24">
                    <path d="M15 18l-6-6 6-6" />
                </svg>
            </button>
            <h2 id="story-title" class="ig-username">sadeen</h2>
            <button id="edit-bio-btn" class="ig-icon-btn hidden">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
                </svg>
            </button>
        </div>

        <div class="ig-bio" style="margin-top: 1rem;">
            <div id="ig-fullname" class="ig-fullname">Full Name</div>
            <div id="bio-text" class="ig-bio-text"></div>
        </div>

        <div class="ig-tabs">
            <div class="ig-tab active" id="tab-stories">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
                    <path d="M12 5v14M5 12h14" />
                </svg>
            </div>
            <div class="ig-tab" id="tab-photos" title="Media">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                    <circle cx="8.5" cy="8.5" r="1.5" />
                    <polyline points="21 15 16 10 5 21" />
                    <path d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14v-4z" />
                </svg>
            </div>
            <div class="ig-tab" id="tab-questions">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                    <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" />
                    <line x1="12" y1="17" x2="12.01" y2="17" />
                </svg>
            </div>
        </div>

        <div id="ig-grid-container" class="ig-grid">
            <div class="ig-grid-item add-story-item" id="add-post-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" width="32" height="32">
                    <line x1="12" y1="5" x2="12" y2="19" />
                    <line x1="5" y1="12" x2="19" y2="12" />
                </svg>
                <span>Add Story</span>
            </div>
        </div>
    </main>

    <!-- Add Story Modal -->
    <div id="add-story-modal" class="modal-overlay hidden">
        <div class="glass-panel modal-panel">
            <h2>Create New Story</h2>
            <p class="modal-hint">Share your thoughts with your followers! 🌸</p>

            <div class="modal-section-v">
                <label class="edit-label">Story Title</label>
                <input type="text" id="story-title-input" placeholder="e.g. My Flowers" class="edit-input">
            </div>

            <div class="modal-section-v">
                <label class="edit-label">Story Content</label>
                <textarea id="story-content-input" rows="8" placeholder="Tell us something sweet! 🌸"
                    class="edit-input"></textarea>
            </div>

            <div id="video-upload-section" class="modal-section-v hidden">
                <label class="edit-label">Upload Media (Photo or Video) 🌸</label>
                <div class="file-upload-wrapper">
                    <input type="file" id="story-video-file" accept="image/*,video/*" class="file-input-hidden">
                    <label for="story-video-file" class="upload-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20"
                            height="20" style="margin-right: 0.5rem;">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                            <circle cx="8.5" cy="8.5" r="1.5" />
                            <polyline points="21 15 16 10 5 21" />
                        </svg>
                        Upload Photo...
                    </label>
                    <span id="video-name-display" class="file-name-display">No photo chosen</span>
                </div>
            </div>

            <div class="modal-actions">
                <button id="save-story-btn" class="primary-btn">
                    <span>Post Story</span>
                </button>
                <button id="warning-story-btn" class="warning-btn" style="margin-top: 1rem; background: #ff2d55; border: none; padding: 12px; border-radius: 12px; color: white; font-weight: 800; cursor: pointer; width: 100%;">
                    🚨 WORNING +18 🔞
                </button>
                <button id="cancel-story-btn" class="secondary-btn" style="margin-top: 1rem;">Back</button>
            </div>
        </div>
    </div>

    <div id="story-reader-modal" class="modal-overlay hidden">
        <div class="glass-panel modal-panel reader-panel">
            <div class="reader-layout">
                <!-- Left: Video View -->
                <div class="reader-media-col">
                    <div id="video-container" class="hidden media-box">
                        <video id="player-video" controls autoplay loop
                            style="width: 100%; height: 100%; object-fit: contain;"></video>
                    </div>
                    <div id="photo-container" class="hidden media-box">
                        <img id="player-photo" src="" alt="Post Content"
                            style="width: 100%; height: 100%; object-fit: contain;">
                    </div>
                    <div id="text-display" class="text-display">
                        <div class="text-display-author">
                            <div class="td-avatar" id="td-avatar" style="background:#ff69b4;">D</div>
                            <span class="td-name" id="td-name">sadeen 🌸</span>
                            <span class="td-date" id="td-date">Just now</span>
                        </div>
                        <h2 class="text-display-title" id="td-title"></h2>
                        <div class="text-display-content" id="td-content"></div>
                    </div>
                </div>

                <!-- Right: Info and Comments -->
                <div class="reader-info-col">
                    <div class="reader-header">
                        <div class="reader-author">
                            <div class="author-avatar" id="reader-avatar" style="background: #ff69b4;">D</div>
                            <div class="author-details">
                                <strong id="reader-author-name">sadeen 🌸</strong>
                                <span id="reader-post-date">Just now</span>
                            </div>
                        </div>
                        <button id="close-reader-btn" class="close-icon-btn">
                            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <line x1="18" y1="6" x2="6" y2="18" />
                                <line x1="6" y1="6" x2="18" y2="18" />
                            </svg>
                        </button>
                    </div>

                    <div id="comments-list" class="comments-list">
                        <!-- Caption and Description (Stories) -->
                        <div id="reader-caption-box" class="reader-caption"
                            style="border-bottom: 1px solid rgba(255, 182, 193, 0.2); padding-bottom: 1rem;">
                            <div class="reader-author" style="margin-bottom: 0.5rem;">
                                <div class="author-avatar caption-avatar" style="background: #ff69b4;">D</div>
                                <strong class="caption-author-name" style="color: #ff69b4;">sadeen 🌸</strong>
                            </div>
                            <h2 id="reader-title" style="font-size: 1.3rem; margin-bottom: 0.5rem; color: #fff;"></h2>
                            <div id="reader-content"
                                style="font-size: 0.95rem; line-height: 1.5; opacity: 0.9; color: #ffb6b9;"></div>
                        </div>

                        <div id="actual-comments" style="margin-top: 1.5rem;">
                            <!-- Comments go here -->
                        </div>
                    </div>

                    <div class="reader-actions">
                        <div class="action-icons">
                            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path
                                    d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l8.84-8.84 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
                            </svg>
                            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path
                                    d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 1 1-7.6-11.7 8.38 8.38 0 0 1 3.8.9L21 3z" />
                            </svg>
                            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <line x1="22" y1="2" x2="11" y2="13" />
                                <polygon points="22 2 15 22 11 13 2 9 22 2" />
                            </svg>
                        </div>
                        <div class="likes-count" style="color: #ff69b4;">72 likes</div>
                    </div>

                    <div class="comment-input-area">
                        <textarea id="comment-input" placeholder="Add a sweet comment... 🌸"
                            class="comment-textarea"></textarea>
                        <button id="post-comment-btn" class="comment-post-btn" style="color: #ff69b4;">Post</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Modal Overlay -->
    <div id="edit-modal" class="modal-overlay hidden">
        <div class="glass-panel modal-panel">
            <h2>Profile Settings</h2>
            <p class="modal-hint">Customize your account completely!</p>

            <div class="modal-section-v">
                <label class="edit-label">Display Name</label>
                <input type="text" id="edit-name" placeholder="Your Name" class="edit-input">
            </div>

            <div class="modal-section-v">
                <label class="edit-label">Bio Description</label>
                <textarea id="bio-editor" rows="4" placeholder="Type your bio..."></textarea>
            </div>

            <div class="modal-section-v">
                <label class="edit-label">Profile Wallpaper</label>
                <div class="file-upload-wrapper">
                    <input type="file" id="edit-wallpaper-file" accept="image/*,video/*" class="file-input-hidden">
                    <label for="edit-wallpaper-file" class="upload-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20"
                            height="20" style="margin-right: 0.5rem;">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                            <polyline points="17 8 12 3 7 8" />
                            <line x1="12" y1="3" x2="12" y2="15" />
                        </svg>
                        Upload Photo or Video
                    </label>
                    <span id="file-name-display" class="file-name-display">No file chosen</span>
                </div>
                <div id="wallpaper-preview-container" class="wallpaper-preview-container hidden">
                    <img id="wallpaper-preview-img" src="" alt="Wallpaper Preview" class="hidden">
                    <video id="wallpaper-preview-video" autoplay loop muted playsinline class="hidden"></video>
                </div>
                <button id="clear-wallpaper-btn" class="secondary-btn" style="margin-top: 1rem;">Reset
                    Wallpaper</button>
            </div>

            <div class="modal-actions" style="margin-top: 2rem;">
                <button id="save-bio-btn" class="primary-btn">
                    <span>Save Changes</span>
                </button>
                <button id="cancel-bio-btn" class="secondary-btn" style="margin-top: 1rem; width: 100%;">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        window.CURRENT_STORY_ID = 'sadeen';
        window.OWNER_ACCOUNTS = ['2', 'sadeen', 'sadeen'];
        window.CURRENT_CATEGORY = 'story';
    </script>
    <script src="story.js"></script>
    <script src="dms.js"></script>
</body>

</html>
