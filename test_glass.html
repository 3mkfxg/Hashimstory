<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiquidGlass Demo</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            gap: 40px;
            padding: 80px;
            align-items: center;
        }

        .demo-section {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        h2 {
            color: rgba(255, 255, 255, 0.5);
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="demo-section">
        <h2>1. Basic Glass (Rounded 50px, Chromatic Aberration)</h2>
        <div class="liquid-glass chromatic-aberration rounded-50" style="width: 100%;">
            <div style="padding: 2rem; font-size: 2rem; font-weight: 700; color: white;">
                Simple Liquid Glass
            </div>
        </div>
    </div>

    <div class="demo-section">
        <h2>2. Button Style (Black, Chromatic Aberration)</h2>
        <div class="liquid-glass liquid-glass-button chromatic-aberration rounded-30" style="background-color: black; width: fit-content;">
            <a href="#" style="padding: 1.5rem 3rem; font-size: 1.5rem; color: white; text-decoration: none; font-weight: 700;">Click Me</a>
        </div>
    </div>

    <div class="demo-section">
        <h2>3. Inline Usage</h2>
        <div class="liquid-glass rounded-50" style="width: 100%; background: rgba(255,255,255,0.05);">
            <div style="padding: 2rem; color: white; line-height: 2;">
                This is a paragraph where we use an 
                <span class="liquid-glass liquid-glass-button liquid-glass-inline chromatic-aberration rounded-full" style="background: rgba(255,255,255,0.2);">
                    <span style="padding: 0.2rem 0.8rem; font-size: 0.9rem; color: white; font-weight: 600;">inline glass</span>
                </span>
                component to highlight special text.
            </div>
        </div>
    </div>

</body>
</html>
